services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - APP_LLM_PROVIDER=deepseek
      - APP_DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ============================================================
  #  DVWA — Web 漏洞靶场（用于端到端验证）
  #  http://localhost:8080
  #  默认登录: admin / password
  # ============================================================
  dvwa:
    image: vulnerables/web-dvwa:latest
    ports:
      - "8080:80"
    restart: unless-stopped

  # ============================================================
  #  ModSecurity + OWASP CRS — WAF 对比基线（3 档 Paranoia Level）
  #  PL1 (8081): 默认规则集，低误报
  #  PL2 (8082): 更激进的规则，中等误报
  #  PL3 (8083): 最激进，高检出但可能高误报
  #  被拦截的请求返回 403
  # ============================================================
  modsecurity-pl1:
    image: owasp/modsecurity-crs:nginx
    ports:
      - "8081:8080"
    environment:
      BACKEND: "http://dvwa:80"
      PARANOIA: "1"
      PROXY_TIMEOUT: "60"
    depends_on:
      - dvwa
    restart: unless-stopped

  modsecurity-pl2:
    image: owasp/modsecurity-crs:nginx
    ports:
      - "8082:8080"
    environment:
      BACKEND: "http://dvwa:80"
      PARANOIA: "2"
      PROXY_TIMEOUT: "60"
    depends_on:
      - dvwa
    restart: unless-stopped

  modsecurity-pl3:
    image: owasp/modsecurity-crs:nginx
    ports:
      - "8083:8080"
    environment:
      BACKEND: "http://dvwa:80"
      PARANOIA: "3"
      PROXY_TIMEOUT: "60"
    depends_on:
      - dvwa
    restart: unless-stopped

volumes:
  backend-data:
