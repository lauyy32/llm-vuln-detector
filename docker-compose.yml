services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - APP_LLM_PROVIDER=deepseek
      - APP_DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
